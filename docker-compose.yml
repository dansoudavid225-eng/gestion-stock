services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_db:/app/db.sqlite3
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_DEBUG=True
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    restart: unless-stopped

volumes:
  backend_media:
  backend_db:
